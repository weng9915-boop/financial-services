name: eToro Trading Bot

on:
  schedule:
    # 9:45 AM ET on weekdays (UTC = ET + 4h in summer, + 5h in winter)
    # Adjust the hour below for daylight saving:
    #   Summer (EDT, UTC-4): 13:45 UTC
    #   Winter (EST, UTC-5): 14:45 UTC
    - cron: "45 13 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Bot mode"
        required: true
        default: "research-only"
        type: choice
        options:
          - research-only
          - stoploss-only
          - full

# NOTE: GitHub Actions scheduled workflows only run from the DEFAULT BRANCH (main).
# This file must be merged to main before the schedule trigger becomes active.

jobs:
  trade:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/partner-built/etoro/scripts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests urllib3

      # ---------------------------------------------------------------
      # Static IP proxy — required because eToro's REST API enforces
      # IP allowlisting and GitHub Actions IPs rotate constantly.
      #
      # Option A (recommended): Webshare proxy
      #   1. Sign up at https://www.webshare.io (free tier available)
      #   2. Get a static residential proxy: host, port, user, password
      #   3. Add to GitHub secrets: PROXY_HOST, PROXY_PORT, PROXY_USER, PROXY_PASS
      #   4. Add that proxy IP to your eToro API allowlist
      #
      # Option B: Skip proxy, run the bot locally instead (see README).
      #   In that case, delete the "Set up proxy" step and remove
      #   HTTPS_PROXY from the run steps below.
      # ---------------------------------------------------------------
      - name: Set up proxy
        if: env.PROXY_HOST != ''
        run: |
          echo "HTTPS_PROXY=http://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:${{ secrets.PROXY_PORT }}" >> $GITHUB_ENV
        env:
          PROXY_HOST: ${{ secrets.PROXY_HOST }}

      - name: Run bot (scheduled — full)
        if: github.event_name == 'schedule'
        env:
          ETORO_API_KEY:     ${{ secrets.ETORO_API_KEY }}
          ETORO_USER_KEY:    ${{ secrets.ETORO_USER_KEY }}
          ETORO_ENVIRONMENT: ${{ secrets.ETORO_ENVIRONMENT }}
        run: python3 run_bot.py

      - name: Run bot (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          ETORO_API_KEY:     ${{ secrets.ETORO_API_KEY }}
          ETORO_USER_KEY:    ${{ secrets.ETORO_USER_KEY }}
          ETORO_ENVIRONMENT: ${{ secrets.ETORO_ENVIRONMENT }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "research-only" ]; then
            python3 run_bot.py --research-only
          elif [ "$MODE" = "stoploss-only" ]; then
            python3 run_bot.py --stoploss-only
          else
            python3 run_bot.py
          fi

      - name: Upload journal
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-journal-${{ github.run_id }}
          path: plugins/partner-built/etoro/scripts/journals/
          if-no-files-found: ignore
